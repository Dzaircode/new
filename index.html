<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sirr Galbi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Marcellus&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --plum-deep:#180912;
    --wine:#3d1428;
    --wine-soft:#5a1f39;
    --rose-gold:#d98f7a;
    --gold:#c9a15a;
    --cream:#f3e3cf;
    --cream-dim:#d8c4ac;
    --ember:#e8a87c;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    background:var(--plum-deep);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    position:relative;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(90,31,57,0.55), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(61,20,40,0.6), transparent 55%),
      var(--plum-deep);
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* ---------- floating embers ---------- */
  #embers{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
  }
  .ember{
    position:absolute;
    bottom:-10px;
    width:6px;
    height:6px;
    border-radius:50%;
    background:radial-gradient(circle, var(--ember), transparent 70%);
    opacity:0;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) scale(0.6); opacity:0; }
    10%{ opacity:0.9; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)) scale(1.1); opacity:0; }
  }

  /* ---------- LOCK SCREEN ---------- */
  #lock{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    transition:opacity 0.9s ease, filter 0.9s ease;
  }

  .card{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:48px 32px 40px;
    border:1px solid rgba(201,161,90,0.25);
    border-radius:4px;
    background:linear-gradient(180deg, rgba(61,20,40,0.35), rgba(24,9,18,0.55));
    backdrop-filter:blur(6px);
    box-shadow:0 30px 80px rgba(0,0,0,0.55);
    position:relative;
  }

  .seal{
    width:64px;
    height:64px;
    margin:0 auto 22px;
    position:relative;
  }
  .seal svg{ width:100%; height:100%; display:block; }
  .seal path{
    fill:none;
    stroke:var(--gold);
    stroke-width:1.4;
    filter:drop-shadow(0 0 6px rgba(201,161,90,0.5));
  }
  .seal .heart-fill{
    fill:var(--wine-soft);
    stroke:var(--rose-gold);
  }
  .seal-pulse{
    animation:pulse 2.6s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.08); }
  }

  .eyebrow{
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-family:'Marcellus', serif;
    font-size:11px;
    color:var(--gold);
    opacity:0.85;
    margin-bottom:14px;
  }

  h1{
    font-family:'Marcellus', serif;
    font-weight:400;
    font-size:clamp(24px, 6vw, 30px);
    color:var(--cream);
    letter-spacing:0.02em;
    margin-bottom:8px;
  }

  .sub{
    font-size:16px;
    color:var(--cream-dim);
    font-style:italic;
    margin-bottom:30px;
  }

  .pw-row{
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }

  #pw{
    flex:1;
    background:rgba(24,9,18,0.6);
    border:1px solid rgba(216,196,172,0.3);
    border-radius:2px;
    color:var(--cream);
    font-family:'Marcellus', serif;
    font-size:17px;
    letter-spacing:0.3em;
    text-align:center;
    padding:14px 10px;
    outline:none;
    transition:border-color 0.3s ease, box-shadow 0.3s ease;
  }
  #pw::placeholder{ color:rgba(216,196,172,0.4); letter-spacing:0.1em; }
  #pw:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,161,90,0.15);
  }

  #unlockBtn{
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Marcellus', serif;
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding:14px 20px;
    border-radius:2px;
    cursor:pointer;
    transition:background 0.3s ease, color 0.3s ease;
    white-space:nowrap;
  }
  #unlockBtn:hover{ background:var(--gold); color:var(--plum-deep); }
  #unlockBtn:active{ transform:translateY(1px); }

  #hint{
    min-height:20px;
    font-size:13px;
    color:var(--rose-gold);
    font-style:italic;
    opacity:0;
    transition:opacity 0.3s ease;
  }
  #hint.show{ opacity:1; }

  .shake{ animation:shake 0.45s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(8px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
  }

  #lock.hide{
    opacity:0;
    filter:blur(6px);
    pointer-events:none;
  }

  /* ---------- LETTER SCREEN ---------- */
  #letter{
    position:relative;
    z-index:2;
    display:none;
    min-height:100vh;
    padding:70px 20px 100px;
  }
  #letter.show{ display:block; }

  .letter-wrap{
    max-width:640px;
    margin:0 auto;
  }

  .letter-head{
    text-align:center;
    margin-bottom:46px;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:0.15s;
  }

  .letter-head .flame{
    width:34px;
    height:34px;
    margin:0 auto 16px;
  }

  .letter-eyebrow{
    font-family:'Marcellus', serif;
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
    margin-bottom:10px;
  }

  .letter-title{
    font-family:'Amiri', serif;
    font-style:italic;
    font-size:clamp(26px, 7vw, 36px);
    color:var(--cream);
  }

  .letter-title span{ color:var(--rose-gold); }

  .divider{
    width:70px;
    height:1px;
    margin:24px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  #paragraphs p{
    font-size:clamp(17px, 4vw, 20px);
    line-height:1.95;
    color:var(--cream-dim);
    text-align:center;
    margin-bottom:30px;
    opacity:0;
    transform:translateY(16px);
    transition:opacity 1s ease, transform 1s ease;
  }

  #paragraphs p.in{
    opacity:1;
    transform:translateY(0);
  }

  #paragraphs p em{
    font-style:italic;
    color:var(--cream);
  }

  #paragraphs p.accent{
    font-family:'Amiri', serif;
    font-size:clamp(19px, 4.5vw, 23px);
    color:var(--rose-gold);
  }

  .signoff{
    text-align:center;
    margin-top:56px;
    opacity:0;
    transition:opacity 1.4s ease;
  }
  .signoff.in{ opacity:1; }
  .signoff .name{
    font-family:'Marcellus', serif;
    font-size:22px;
    letter-spacing:0.15em;
    color:var(--gold);
  }
  .signoff .tiny{
    display:block;
    margin-top:10px;
    font-size:13px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--cream-dim);
    opacity:0.7;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(-12px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (max-width:480px){
    .card{ padding:38px 22px 32px; }
    .pw-row{ flex-direction:column; }
    #unlockBtn{ padding:13px; }
  }
</style>
</head>
<body>

<div id="embers"></div>

<!-- LOCK SCREEN -->
<section id="lock">
  <div class="card" id="card">
    <div class="seal">
      <div class="seal-pulse">
        <svg viewBox="0 0 64 64">
          <path class="heart-fill" d="M32 54 C14 42 6 30 6 19 C6 10 13 4 21 4 C26 4 30 7 32 12 C34 7 38 4 43 4 C51 4 58 10 58 19 C58 30 50 42 32 54 Z"/>
        </svg>
      </div>
    </div>
    <div class="eyebrow">Sirr Mahfouz</div>
    <h1>Rah 3andi haja lik</h1>
    <p class="sub">dkhol l password bach tchouf</p>
    <p class="sub">Veuillez saisir ma date de naissance complète <br>
        (dkhali ta3i kamla bla / las9a w bedi b 18)</p>

    <div class="pw-row">
      <input type="password" id="pw" placeholder="••••••••" inputmode="numeric" maxlength="20" autocomplete="off">
      <button id="unlockBtn">Ftah</button>
    </div>
    <div id="hint">password ghalt, 3awd jarreb</div>
  </div>
</section>

<!-- LETTER SCREEN -->
<section id="letter">
  <div class="letter-wrap">
    <div class="letter-head">
      <div class="flame">
        <svg viewBox="0 0 64 64">
          <path class="heart-fill" d="M32 54 C14 42 6 30 6 19 C6 10 13 4 21 4 C26 4 30 7 32 12 C34 7 38 4 43 4 C51 4 58 10 58 19 C58 30 50 42 32 54 Z"/>
        </svg>
      </div>
      <div class="letter-eyebrow">Mn Galbi</div>
      <div class="letter-title">Ila <span>Baloma</span></div>
      <div class="divider"></div>
    </div>

    <div id="paragraphs"></div>

    <div class="signoff" id="signoff">
      <div class="name">Yassine</div>
      <span class="tiny">rah mek, hta y mout</span>
    </div>
  </div>
</section>

<script>
  /* ---------- ambient embers ---------- */
  const emberField = document.getElementById('embers');
  const EMBER_COUNT = 26;
  for(let i=0;i<EMBER_COUNT;i++){
    const e = document.createElement('div');
    e.className = 'ember';
    const size = 3 + Math.random()*5;
    e.style.width = size+'px';
    e.style.height = size+'px';
    e.style.left = Math.random()*100+'vw';
    e.style.setProperty('--drift', (Math.random()*80-40)+'px');
    const dur = 9 + Math.random()*10;
    e.style.animationDuration = dur+'s';
    e.style.animationDelay = (Math.random()*dur)+'s';
    emberField.appendChild(e);
  }

  /* ---------- password gate ---------- */
  const PASSWORD = "18032002";
  const pwInput = document.getElementById('pw');
  const unlockBtn = document.getElementById('unlockBtn');
  const hint = document.getElementById('hint');
  const card = document.getElementById('card');
  const lock = document.getElementById('lock');
  const letter = document.getElementById('letter');

  function tryUnlock(){
    if(pwInput.value.trim() === PASSWORD){
      lock.classList.add('hide');
      setTimeout(()=>{
        lock.style.display = 'none';
        letter.classList.add('show');
        window.scrollTo(0,0);
        revealParagraphs();
      }, 850);
    } else {
      hint.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      pwInput.value = '';
      pwInput.focus();
    }
  }

  unlockBtn.addEventListener('click', tryUnlock);
  pwInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') tryUnlock();
  });

  /* ---------- letter content ---------- */
  const lines = [
    "Bgit nreslk vocal chah mknch vocal ya bakhta, Ida mkich mliha, Ida mkich ghaya, raaani hnaaa nhraaab mek deniya, la bgha di deniya contre lik ana",
    "nji mek c'est vrai, Tgoli nti mntfahmouch, c'est vrai mn3arfch nhadr mek, mais Nbgik w rani mek",
    "Hta nkmel, Hta nmout wlh la rani m3k, mtgolich rani whdi non jamais wla nti whdk",
    "Ani mek ntiii, 3ayniya n3tihalk wlh, gir 3ayniyaa n3tihmlk ya3niii ay haja mrahi khasssraaa",
    "Fik mtgo3diiich mdeprsaa, raki kemlti 9aryitk sdi rah tkhedmi Lsl, rabi ygoulek",
    "لَقَدْ خَلَقْنَا الإِنسَانَ فِي كَبَدٍ",
    "Ya3ni kayin mchakil w kayin macha9a, Mali ma tet9al9 balo mti maaa walou, ana ana wlh mnza3f menk",
    "ya3ni nhadr nhadr chah mnz3fch menk, nhss 3wnk teblokni 1000…. Mnz3fch menk, nti balomti kiyah nza3f meeenk",
    "Mknch menha w nzidk dima nkhamem Fik, Mohim tfooorj elik, Nchlh w nbgiiiik",
    "Hta ma tetkhaaylich bzf bzf bzfff, w sdi zwadj Hta tkoni bgiyaa nti, ana rani 9a3d lik wlh la rani 9a3d lik",
    "mtgolich rah ytzwj w … non jamais, ana rani 9a3d Hta tkoni wajda 100%, Mali matkhamich fi di gaaaa3",
    "Mohim mtgolich Ani wahdi, yasssin rah mek hta y mout w nbgggggii bzf balomtiii",
    "hadi idee chaba bach nhadr m3k mohim nkhmem fik bzf hta mtkhamich w nkhmem kifaaaaah nfareehk chah chwoiya mn3arfch nhadr yakhi ta33rfni kaaaaaater men rohiii ta3rfini bien ga3 bla explain ",


  ];

  const container = document.getElementById('paragraphs');
  lines.forEach((txt, i)=>{
    const p = document.createElement('p');
    if(i === 5) p.classList.add('accent');
    p.textContent = txt;
    container.appendChild(p);
  });

  function revealParagraphs(){
    const ps = document.querySelectorAll('#paragraphs p');
    ps.forEach((p, idx)=>{
      setTimeout(()=>{ p.classList.add('in'); }, 220 * idx + 200);
    });
    const total = ps.length;
    setTimeout(()=>{
      document.getElementById('signoff').classList.add('in');
    }, 220 * total + 500);
  }

  pwInput.focus();
</script>
</body>
</html>
